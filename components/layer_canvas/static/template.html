<div class="layer-canvas-container">
  <script type="application/json" class="layer-canvas-data">${value}</script>
  <div class="canvas-wrapper">
    <canvas class="main-canvas"></canvas>
    <canvas class="interaction-canvas"></canvas>
  </div>
  <div class="tooltip"></div>
  <div class="control-panel">
    <div class="panel-header">
      <span class="panel-title">图层</span>
      <div class="panel-actions">
        <button class="cp-btn add-rect-btn" title="添加矩形图层">
          <svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="cp-btn add-mask-btn" title="添加遮罩图层">
          <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="cp-btn clear-all-btn" title="清除所有图层">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 6L5 18M5 6l14 12" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
    <div class="layer-list"></div>
    <div class="layer-properties">
      <div class="prop-section">
        <div class="prop-row">
          <label>不透明度</label>
          <input type="range" class="opacity-slider" min="0" max="1" step="0.1" value="1">
          <span class="opacity-value">100%</span>
        </div>
      </div>
      <div class="prop-section rect-props" style="display:none;">
        <div class="prop-row">
          <label>X</label>
          <input type="number" class="rect-x" value="0">
        </div>
        <div class="prop-row">
          <label>Y</label>
          <input type="number" class="rect-y" value="0">
        </div>
        <div class="prop-row">
          <label>宽度</label>
          <input type="number" class="rect-width" value="100" min="1">
        </div>
        <div class="prop-row">
          <label>高度</label>
          <input type="number" class="rect-height" value="100" min="1">
        </div>
        <div class="prop-row">
          <label>填充色</label>
          <input type="color" class="rect-color" value="#4a9eff">
        </div>
        <div class="prop-row">
          <label>边框色</label>
          <input type="color" class="rect-stroke-color" value="#ffffff">
        </div>
        <div class="prop-row">
          <label>边框宽</label>
          <input type="number" class="rect-stroke-width" value="2" min="0">
        </div>
        <div class="prop-row">
          <label>填充</label>
          <input type="checkbox" class="rect-fill" checked>
        </div>
        <div class="prop-row">
          <label>圆角</label>
          <input type="number" class="rect-border-radius" value="0" min="0">
        </div>
      </div>
      <div class="prop-section mask-props" style="display:none;">
        <div class="prop-row">
          <label>遮罩色</label>
          <input type="color" class="mask-color" value="#000000">
        </div>
        <div class="prop-row">
          <label>遮罩透明度</label>
          <input type="range" class="mask-opacity-slider" min="0" max="1" step="0.05" value="0.7">
          <span class="mask-opacity-value">70%</span>
        </div>
      </div>
    </div>
    <div class="export-controls">
      <button class="export-btn export-json-btn">导出JSON</button>
    </div>
  </div>
  <div class="toolbar">
    <button class="tool-btn select-tool active" title="选择工具 (V)">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn rect-tool" title="矩形工具 (R)">
      <svg viewBox="0 0 24 24" width="16" height="16"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn mask-tool" title="遮罩工具 (M)">
      <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </div>
  <div class="loading-indicator"><div class="loading-spinner"></div></div>
  <div class="placeholder">无数据</div>
</div>
