<div class="layer-canvas-container">
  <script type="application/json" class="layer-canvas-data">${value}</script>
  <div class="canvas-wrapper">
    <canvas class="main-canvas"></canvas>
    <canvas class="interaction-canvas"></canvas>
    <div class="zoom-indicator">
      <span class="zoom-value">100%</span>
      <button class="zoom-reset-btn" title="重置缩放">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 3v5h5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>
  </div>
  <div class="tooltip"></div>
  <div class="control-panel">
    <div class="panel-header">
      <span class="panel-title">目标</span>
      <div class="panel-actions">
        <button class="cp-btn add-rect-btn" title="添加矩形目标">
          <svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="cp-btn add-mask-btn" title="添加遮罩目标">
          <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="cp-btn clear-all-btn" title="清除所有目标">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 6L5 18M5 6l14 12" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
    <div class="layer-list"></div>
    <div class="export-controls">
      <button class="export-btn export-json-btn">应用</button>
    </div>
  </div>
  <div class="toolbar">
    <button class="tool-btn select-tool active" title="选择工具 (V)">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn rect-tool" title="矩形工具 (R)">
      <svg viewBox="0 0 24 24" width="16" height="16"><rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn mask-tool" title="遮罩工具 (M)">
      <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-btn add-node-tool" title="添加节点 (A)">
      <svg viewBox="0 0 24 24" width="16" height="16">
        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M18 14.5v7M14.5 18h7" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
    <button class="tool-btn delete-node-tool" title="删除节点 (D)">
      <svg viewBox="0 0 24 24" width="16" height="16">
        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M14.5 18h7" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
  </div>
  <div class="loading-indicator"><div class="loading-spinner"></div></div>
  <div class="placeholder">无数据</div>
</div>
